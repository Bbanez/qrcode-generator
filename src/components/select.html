<div style="display: flex; flex-direction: column">
    <label
        for="{{id}}"
        style="text-transform: uppercase; font-size: 12px; color: var(--c-fg)"
    >
        {{label}}
    </label>
    <select
        id="{{id}}"
        style="
            background-color: var(--c-bg);
            color: var(--c-fg);
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        "
    >
        {{options}}
    </select>
</div>
