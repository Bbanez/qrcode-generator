<div
    id="{{id}}"
    style="
        position: relative;
        width: 100%;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
    "
>
    <div
        id="{{id}}_line"
        style="
            width: 95%;
            height: 4px;
            background: {{lineColor}};
        "
    ></div>
    <div
        id="{{id}}_knob"
        style="
            position: absolute;
            top: 6;
            left: 2%;
            width: 14px;
            height: 14px;
            background-color: white;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.9);
        "
    ></div>
</div>

<script>
    window.addEventListener('load', () => {
        const parentId = '{{parentId}}';
        const parentEl = document.getElementById(parentId);
        const id = '{{id}}';
        let value = 0;
        let down = false;
        const el = document.getElementById('{{id}}');
        const knobEl = document.getElementById('{{id}}_knob');
        const bb = document
            .getElementById('{{id}}_line')
            .getBoundingClientRect();
        const vtfn = new SimpleLinearFn(vec2(bb.left, 0), vec2(bb.right, 255));
        const ptfn = new SimpleLinearFn(vec2(0, 2), vec2(255, 91));

        /**
         * @param {number} x
         */
        function calcPos(x) {
            value = Math.floor(vtfn.cal(x));
            if (value < 0) {
                value = 0;
            } else if (value > 255) {
                value = 255;
            }
            knobEl.style.left = `${ptfn.cal(value)}%`;
            window['{{id}}_setValue'](value);
        }

        window.addEventListener('mousemove', (event) => {
            if (!down) {
                return;
            }
            calcPos(event.clientX);
        });
        window.addEventListener('mousedown', (event) => {
            const parent = window.findParentElById(event.target, id);
            if (!parent) {
                return;
            }
            down = true;
            calcPos(event.clientX);
        });
        window.addEventListener('mouseup', (event) => {
            down = false;
        });
        window['{{id}}_setValue'] = (val) => {};
        window['{{id}}_onSetValue'] = (val) => {
            value = val;
            if (value < 0) {
                value = 0;
            } else if (value > 255) {
                value = 255;
            }
            knobEl.style.left = `${ptfn.cal(value)}%`;
        };
    });
</script>
