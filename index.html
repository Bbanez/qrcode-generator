<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="preload"
            href="/webfonts/JetBrainsMono-Regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link rel="stylesheet" href="/src/styles/reset.css" type="text/css" />
        <link rel="stylesheet" href="/src/styles/fonts.css" type="text/css" />
        <style>
            :root {
                --c-fg: #fff;
                --c-bg: #000;
            }
            * {
                user-select: none;
            }
        </style>

        <title>QRCode Generator</title>
    </head>

    <body
        style="
            background-color: var(--c-bg);
            color: var(--c-fg);
            display: flex;
            flex-direction: column;
            font-family: 'JetBrains Mono';
        "
    >
        <h1
            style="
                font-size: 32px;
                margin: 20px auto 60px auto;
            "
        >
            QRCode Generator
        </h1>
        <canvas
            id="canvas"
            style="width: 400px; height: 400px; margin: 0 auto"
            width="400"
            height="400"
        ></canvas>
        <div
            style="
                position: relative;
                display: flex;
                flex-direction: column;
                width: 100%;
                max-width: 400px;
                margin: 0 auto;
                margin-top: 40px;
            "
        >
            <div
                style="
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 20px;
                    margin-top: 20px;
                "
            >
                <!-- {{fgcPicker}} -->
                <!-- {{bgcPicker}} -->
            </div>
            <label
                for="input"
                style="
                    text-transform: uppercase;
                    font-size: 12px;
                    color: var(--c-fg);
                    margin-top: 20px;
                "
            >
                Input Text
            </label>
            <textarea
                id="input"
                placeholder="Enter text to generate QR code"
                style="
                    background-color: var(--c-bg);
                    color: var(--c-fg);
                    height: 100px;
                    padding: 10px;
                    font-size: 16px;
                    border: 1px solid #ccc;
                    border-radius: 4px;
                    resize: none;
                "
            ></textarea>
            <label
                for="input"
                style="
                    text-transform: uppercase;
                    font-size: 12px;
                    color: var(--c-fg);
                    margin-top: 20px;
                "
            >
                Error Correction Level
            </label>
            <select
                id="ec-level"
                style="
                    background-color: var(--c-bg);
                    color: var(--c-fg);
                    width: 100%;
                    padding: 10px;
                    font-size: 16px;
                    border: 1px solid #ccc;
                    border-radius: 4px;
                "
            >
                <option value="L">Low (7%)</option>
                <option value="M">Medium (15%)</option>
                <option value="Q">Quartile (25%)</option>
                <option value="H" selected>High (30%)</option>
            </select>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
