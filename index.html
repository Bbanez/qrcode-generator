<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/src/styles/reset.css" type="text/css" />
        <link rel="stylesheet" href="/src/styles/fonts.css" type="text/css" />
        <style>
            :root {
                --c-fg: #fff;
                --c-bg: #000;
            }
            * {
                user-select: none;
            }
        </style>

        <title>QRCode Generator</title>
        <meta
            name="description"
            content="Truly free simple QR code generator.Completely client-side, what you input is what you get in the QR code!"
        />
        <meta
            name="keywords"
            content="QR code generator, QR code, free QR code generator, client-side QR code"
        />
        <meta name="author" content="QRCode Generator" />
        <meta name="robots" content="index, follow" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="QRCode Generator" />
        <meta
            property="og:description"
            content="Truly free simple QR code generator. Completely client-side, what you input is what you get in the QR code!"
        />
        <meta property="og:image" content="/favicon.png" />
        <meta property="og:url" content="/" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="QRCode Generator" />
        <meta
            name="twitter:description"
            content="Truly free simple QR code generator. Completely client-side, what you input is what you get in the QR code!"
        />
        <meta name="twitter:image" content="/favicon.png" />
    </head>

    <body
        style="
            background-color: var(--c-bg);
            color: var(--c-fg);
            display: flex;
            flex-direction: column;
            font-family: monospace;
        "
    >
        <h1
            style="
                font-size: 32px;
                margin: 20px auto 60px auto;
                font-weight: bold;
            "
        >
            QRCode Generator
        </h1>
        <canvas
            id="canvas"
            style="width: 400px; height: 400px; margin: 0 auto"
            width="400"
            height="400"
        ></canvas>
        <button
            id="save"
            style="
                width: 100%;
                max-width: 400px;
                margin: 20px auto 0 auto;
                padding: 10px;
                font-size: 16px;
                background-color: var(--c-bg);
                color: var(--c-fg);
                border: 1px solid #ccc;
                cursor: pointer;
            "
        >
            Download
        </button>
        <div
            style="
                position: relative;
                display: flex;
                flex-direction: column;
                width: 100%;
                max-width: 400px;
                margin: 0 auto;
                margin-top: 20px;
            "
        >
            <div
                style="
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 20px;
                    margin-top: 20px;
                "
            >
                <!-- {{fgcPicker}} -->
                <!-- {{bgcPicker}} -->
            </div>
            <label
                for="input"
                style="
                    text-transform: uppercase;
                    font-size: 12px;
                    color: var(--c-fg);
                    margin-top: 20px;
                "
            >
                Input Text
            </label>
            <textarea
                id="input"
                placeholder="Enter text to generate QR code"
                style="
                    background-color: var(--c-bg);
                    color: var(--c-fg);
                    height: 100px;
                    padding: 10px;
                    font-size: 16px;
                    border: 1px solid #ccc;
                    border-radius: 4px;
                    resize: none;
                "
            ></textarea>
            <div
                style="
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 20px;
                    margin-top: 20px;
                "
            >
                <!-- style_select -->
                <!-- ec_level -->
            </div>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
